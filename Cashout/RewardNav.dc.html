<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
</helmet>
<div style="display:flex;align-items:flex-end;justify-content:space-around;padding:11px 6px 14px;background:#0C1218;border-top:1px solid rgba(255,255,255,.06);">
  <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="5">
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;cursor:pointer;">
      <span style="font-family:'Material Symbols Rounded';font-size:25px;line-height:1;color:{{ t.color }};font-variation-settings:{{ t.fill }};">{{ t.icon }}</span>
      <span style="font-size:10px;font-weight:{{ t.weight }};color:{{ t.color }};font-family:'Manrope',sans-serif;letter-spacing:.2px;">{{ t.label }}</span>
      <div style="width:5px;height:5px;border-radius:50%;background:{{ t.dot }};box-shadow:{{ t.glow }};"></div>
    </div>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:412,&quot;height&quot;:72},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;offers&quot;,&quot;rewards&quot;,&quot;wallet&quot;,&quot;profile&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const a = this.props.active || 'home';
    const blue = '#2E8FFF', mute = 'rgba(244,247,251,.42)';
    const def = [
      ['home','Home','home'],
      ['offers','Offers','local_offer'],
      ['rewards','Rewards','redeem'],
      ['wallet','Wallet','account_balance_wallet'],
      ['profile','Profile','person']
    ];
    return {
      tabs: def.map(([key,label,icon])=>{
        const on = key === a;
        return {
          icon, label,
          color: on ? blue : mute,
          weight: on ? 700 : 500,
          fill: on ? "'FILL' 1" : "'FILL' 0",
          dot: on ? blue : 'transparent',
          glow: on ? '0 0 8px rgba(46,143,255,.8)' : 'none'
        };
      })
    };
  }
}
</script>
</body>
</html>
